<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Loop Aura Farmer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #FFE6BC, #FFDEE9);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app-name {
      font-size: 20px;
      font-weight: 700;
      color: #FF8C42;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .welcome-text {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }

    .cta-button {
      background: #FF8C42;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .cta-button:hover {
      background: #ff7a2a;
    }

    .footer-note {
      font-size: 13px;
      color: #999;
      margin-top: 25px;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="app-name">Loop Aura Farmer</div>
    <div class="welcome-text">Welcome!</div>
    <div class="subtitle">Your email has been verified successfully.</div>
    <button class="cta-button" onclick="startJourney()">Start Your Journey</button>
    <div class="footer-note">A calm space to grow your vibe 🌿</div>
  </div>

  <script>
    function startJourney() {
      alert("Redirecting to the app...");
      // window.location.href = "/dashboard";
    }
  </script>
</body>
</html>
