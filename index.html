<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loop Aura Farmer - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #FFE6BC, #FFDEE9);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .polaroid {
      background: white;
      padding: 40px 30px 60px;
      border-radius: 12px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      text-align: center;
      width: 320px;
      border: 6px solid #fff;
      position: relative;
      z-index: 5;
    }

    .app-title {
      font-size: 18px;
      color: #FF8C42;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .headline {
      font-size: 28px;
      font-weight: 800;
      color: #333;
      margin-bottom: 10px;
    }

    .message {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
    }

    .cta-button {
      background: #FF8C42;
      color: white;
      font-weight: bold;
      padding: 12px 26px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cta-button:hover {
      background: #f5772e;
    }

    .footer {
      font-size: 13px;
      color: #888;
      margin-top: 28px;
    }

    /* Stickers */
    .sticker {
      position: absolute;
      font-size: 40px;
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
    }

    .s1 {
      top: 10%;
      left: 8%;
      transform: rotate(-15deg);
    }

    .s2 {
      top: 20%;
      right: 10%;
      transform: rotate(10deg);
    }

    .s3 {
      bottom: 10%;
      left: 12%;
      transform: rotate(5deg);
    }

    .s4 {
      bottom: 12%;
      right: 12%;
      transform: rotate(-10deg);
    }

    .s5 {
      top: 50%;
      left: -5%;
      transform: rotate(30deg);
    }

    .s6 {
      bottom: 50%;
      right: -5%;
      transform: rotate(-25deg);
    }
  </style>
</head>

<body>

  <div class="sticker s1">🌱</div>
  <div class="sticker s2">🍊</div>
  <div class="sticker s3">✨</div>
  <div class="sticker s4">☁️</div>
  <div class="sticker s5">🌞</div>
  <div class="sticker s6">🌼</div>

  <div class="polaroid">
    <div class="app-title">Loop Aura Farmer</div>
    <div class="headline">Welcome!</div>
    <div class="message">Your email has been verified successfully.</div>
    <button class="cta-button" onclick="startJourney()">Start Your Journey</button>
    <div class="footer">A calm space to grow your vibe 🌿</div>
  </div>

  <script>
    function startJourney() {
      alert('Redirecting to your aura dashboard...');
    }
  </script>

</body>

</html>
